name: CI/CD Deployment

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run ESLint
        run: npm run lint

      - name: Run Build
        run: npm run build

  deploy:
    name: Deploy to Server
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            
            # Load user profiles and NVM for non-interactive shells
            [ -s "$HOME/.profile" ] && . "$HOME/.profile"
            [ -s "$HOME/.bashrc" ] && . "$HOME/.bashrc"
            export NVM_DIR="$HOME/.nvm"
            if [ -s "$NVM_DIR/nvm.sh" ]; then
              . "$NVM_DIR/nvm.sh"
            fi
            
            echo "Starting Deployment..."
            
            # Create directory if it does not exist
            if [ ! -d "/home/minecraftServerManager" ]; then
              echo "Verzeichnis /home/minecraftServerManager existiert nicht. Erstelle..."
              mkdir -p /home/minecraftServerManager
            fi
            
            cd /home/minecraftServerManager
            
            # Check if git repository is present, if not clone it
            if [ ! -d ".git" ]; then
              echo "Git-Repository nicht initialisiert. Klone..."
              git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git .
            else
              # Update remote URL with the fresh temporary GITHUB_TOKEN
              git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
              git fetch origin main
              git reset --hard origin/main
            fi

            # Verify DATABASE_URL exists (either in existing .env or in secrets)
            if [ -f ".env" ]; then
              if ! grep -q "^DATABASE_URL=.\+" .env; then
                echo "ERROR: DATABASE_URL is empty in the existing .env file on the server!"
                exit 1
              fi
            else
              echo "Erstelle .env Datei auf dem Server..."
              DATABASE_URL_VAL="${{ secrets.DATABASE_URL }}"
              if [ -z "$DATABASE_URL_VAL" ]; then
                echo "=========================================================================="
                echo "ERROR: The secrets.DATABASE_URL secret is not set in your GitHub repository!"
                echo "Please add DATABASE_URL under: Settings -> Secrets and variables -> Actions"
                echo "=========================================================================="
                exit 1
              fi
              
              RANDOM_SECRET=$(openssl rand -hex 32 2>/dev/null || echo "fallback-secret-phrase-that-is-at-least-32-chars-long")
              
              echo "PORT=${{ secrets.PORT || 3000 }}" > .env
              echo "DATABASE_URL=$DATABASE_URL_VAL" >> .env
              echo "JWT_SECRET=$RANDOM_SECRET" >> .env
              echo "DISCORD_CLIENT_ID=${{ secrets.DISCORD_CLIENT_ID }}" >> .env
              echo "DISCORD_CLIENT_SECRET=${{ secrets.DISCORD_CLIENT_SECRET }}" >> .env
              echo "DISCORD_REDIRECT_URI=${{ secrets.DISCORD_REDIRECT_URI }}" >> .env
              echo "MINECRAFT_SERVERS_DIR=${{ secrets.MINECRAFT_SERVERS_DIR || './servers' }}" >> .env
              echo "NODE_ENV=production" >> .env
              chmod 600 .env
            fi
            
            # Install dependencies
            npm install
            
            # Run Prisma Migrations & Client Generation
            npx prisma migrate deploy
            npx prisma generate
            
            # Build application
            npm run build
            
            # Load environment variables from .env
            if [ -f ".env" ]; then
              export $(grep -v '^#' .env | xargs)
            fi
            
            # Reload or start application in PM2
            if pm2 describe minecraft-server-manager > /dev/null 2>&1; then
              echo "Reloading minecraft-server-manager..."
              pm2 reload minecraft-server-manager --update-env
            else
              echo "Starting minecraft-server-manager for the first time..."
              pm2 start node_modules/next/dist/bin/next --name "minecraft-server-manager" -- start
            fi
            
            echo "Deployment completed successfully!"
